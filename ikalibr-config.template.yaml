# iKalibr config generated by motiv/calibrate_offset.py — LiDAR + IMU only (time-offset focus).
# Placeholders (__NAME__) are filled by the driver. Schema matches ulong2/ie_kalibr_image.
Configor:
  DataStream:
    IMUTopics:
      - key: "__IMU_TOPIC__"
        value:
          Type: "SENSOR_IMU"
          Intrinsics: "/home/iKalibr/install/share/ikalibr/config/imu-intri.yaml"
          AcceWeight: 17.68
          GyroWeight: 57.66
    RadarTopics:
    LiDARTopics:
      - key: "__LIDAR_TOPIC__"
        value:
          Type: "__LIDAR_TYPE__"
          Weight: 100.0
    CameraTopics:
    RGBDTopics:
    ReferIMU: "__IMU_TOPIC__"
    BagPath: "__BAG__"
    BeginTime: __BEGIN__
    Duration: __DURATION__
    OutputPath: "__OUTPUT__"
  Prior:
    GravityNorm: __GRAVITY__
    SpatTempPrioriPath: ""
    OptTemporalParams: true        # estimate the LiDAR<->IMU time offset
    TimeOffsetPadding: 0.05        # +/-50 ms search window
    ReadoutTimePadding: 0.01
    MapDownSample: 0.05
    KnotTimeDist:
      SO3Spline: 0.05
      ScaleSpline: 0.05
    NDTLiDAROdometer:
      Resolution: 0.5
      KeyFrameDownSample: 0.1
    LiDARDataAssociate:
      MapDownSample: 0.05
      PointToSurfelMax: 0.1
      PlanarityMin: 0.6
  Preference:
    UseCudaInSolving: false
    Outputs:
      - AlignedInertialMes
    OutputDataFormat: "YAML"
    ThreadsToUse: -1
    SplineScaleInViewer: 3.0
    CoordSScaleInViewer: 0.3
